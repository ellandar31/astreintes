<section class="settings-section" aria-labelledby="schedules-title">
  <div>
    <p class="eyebrow">Paramétrage</p>
    <h3 id="schedules-title">Gestion des horaires Heures Ouvrés</h3>
  </div>

  <form #scheduleNgForm="ngForm" (ngSubmit)="saveAllSchedules()">
    <div class="editable-table-wrapper">
      <table class="editable-table">
        <thead>
          <tr>
            <th>Jour</th>
            <th>Début HO</th>
            <th>Fin HO</th>
          </tr>
        </thead>

        <tbody>
          @for (day of days; track day) {
            <tr>
              <td><strong>{{ day }}</strong></td>

              <td>
                <input
                  type="time"
                  name="hoStart-{{ day }}"
                  [(ngModel)]="scheduleByDay[day].hoStart"
                  required
                />
              </td>

              <td>
                <input
                  type="time"
                  name="hoEnd-{{ day }}"
                  [(ngModel)]="scheduleByDay[day].hoEnd"
                  required
                />
              </td>

            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="form-actions">
      <button class="primary-button" [disabled]="scheduleNgForm.invalid" type="submit">
        Enregistrer les horaires
      </button>
    </div>
  </form>
</section>
