<section class="settings-section">
  <div class="settings-section-header">
    <div>
      <p class="eyebrow">{{ labels.settings.rhTemplates.eyebrow }}</p>
      <h3>{{ labels.settings.rhTemplates.title }}</h3>
    </div>
  </div>

  <div class="template-grid">
    @for (template of templates; track template.id) {
      <article class="template-item">
        <div>
          <h4>{{ template.label }}</h4>
          <p>{{ template.fileName || labels.common.messages.noFileReferenced }}</p>
        </div>

        <label class="file-button">
          {{ labels.settings.rhTemplates.chooseWord }}
          <input accept=".doc,.docx" (change)="setTemplateFile(template, $event)" type="file" />
        </label>
      </article>
    }
  </div>

  <div class="form-actions">
    <button class="primary-button" (click)="saveTemplates()" type="button">{{ labels.settings.rhTemplates.save }}</button>
  </div>
</section>
