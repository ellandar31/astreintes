<section class="rh-panel" aria-labelledby="rh-exports-title">
  <header class="rh-panel-header">
    <div>
      <p class="eyebrow">Exports RH</p>
      <h2 id="rh-exports-title">Exports Word</h2>
    </div>

    <label class="period-control">
      Période
      <input [(ngModel)]="selectedMonth" name="exportMonth" type="month" />
    </label>
  </header>

  <div class="export-grid">
    @for (template of templates; track template.id) {
      <article class="export-item">
        <div>
          <h3>{{ template.label }}</h3>
          <p>
            @if (template.fileName) {
              Modèle configuré : {{ template.fileName }}
            } @else {
              Aucun modèle configuré dans les paramètres RH
            }
          </p>
        </div>

        <div class="export-actions">
          <button class="primary-button" [disabled]="!template.fileName" (click)="exportTemplate(template)" type="button">
            Exporter
          </button>
        </div>
      </article>
    }
  </div>

  @if (exportMessage) {
    <p class="success-message">{{ exportMessage }}</p>
  }
</section>
