<app-modal [title]="modalTitle" size="small" (closed)="closed.emit()">
  <form class="intervention-form" #interventionNgForm="ngForm" (ngSubmit)="save(interventionNgForm)">
    <label>
      {{ labels.common.fields.user }}
      <select class="user-select" name="regularInterventionUser" [ngModel]="form.userId" (ngModelChange)="selectUser($event)" required>
        <option value="">{{ labels.common.users.select }}</option>
        @for (user of users; track user.id) {
          <option [ngValue]="user.id" [title]="userLabel(user)">{{ userLabel(user) }}</option>
        }
      </select>
    </label>

    <label>
      {{ labels.regular.fields.dateStart }}
      <input name="regularInterventionStartDate" [(ngModel)]="form.startDate" required type="datetime-local" />
    </label>

    <label>
      {{ labels.regular.fields.dateEnd }}
      <input name="regularInterventionEndDate" [(ngModel)]="form.endDate" required type="datetime-local" />
    </label>

    <label>
      {{ labels.common.fields.comment }}
      <textarea name="regularInterventionComment" [(ngModel)]="form.comment" rows="4"></textarea>
    </label>

    @if (error) {
      <p class="error-message">{{ error }}</p>
    }

    <div class="form-actions">
      <button class="primary-button" [disabled]="interventionNgForm.invalid" type="submit">{{ labels.common.actions.save }}</button>
    </div>
  </form>
</app-modal>
